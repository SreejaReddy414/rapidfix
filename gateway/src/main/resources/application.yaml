server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

spring:
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
  profiles:
    include: secrets
  application:
    name: api-gateway
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration
  cloud:
    gateway:
      routes:
        - id: auth-routes
          uri: ${USER_SERVICE_URL:http://user-service:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@redisRateLimiter}"
                key-resolver: "#{@ipKeyResolver}"

        - id: user-service
          uri: ${USER_SERVICE_URL:http://user-service:8081}
          predicates:
            - Path=/api/users/**
          filters:
            - JwtAuthFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@redisRateLimiter}"
                key-resolver: "#{@ipKeyResolver}"

        - id: technician-service
          uri: ${TECHNICIAN_SERVICE_URL:http://technician-service:8082}
          predicates:
            - Path=/api/technicians/**
          filters:
            - JwtAuthFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@redisRateLimiter}"
                key-resolver: "#{@ipKeyResolver}"

        - id: dispatch-service
          uri: ${DISPATCH_SERVICE_URL:http://dispatch-service:8083}
          predicates:
            - Path=/api/requests/**
          filters:
            - JwtAuthFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@redisRateLimiter}"
                key-resolver: "#{@ipKeyResolver}"
        - id: chat-websocket
          uri: ${DISPATCH_SERVICE_URL:ws://dispatch-service:8083}
          predicates:
            - Path=/ws/**
          # No JwtAuthFilter here — WebSocket upgrade can't carry Bearer header