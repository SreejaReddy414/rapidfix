server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:RapidFixSuperSecretKeyForJWTTokenMustBe256BitsLongEnough!!}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
spring:
  application:
    name: api-gateway
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration
  cloud:
    gateway:
      routes:
        - id: auth-routes
          uri: http://user-service:8081
          predicates:
            - Path=/api/auth/**

        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/users/**
          filters:
            - JwtAuthFilter

        - id: technician-service
          uri: http://technician-service:8082
          predicates:
            - Path=/api/technicians/**
          filters:
            - JwtAuthFilter

        - id: dispatch-service
          uri: http://dispatch-service:8083
          predicates:
            - Path=/api/requests/**
          filters:
            - JwtAuthFilter